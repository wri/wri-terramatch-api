  /v2/admin/users:
    get:
      summary: Get a collection of users
      operationId: v2-admin-get-users
      description: 'Currently available sort is last_logged_in_at, created_at, first_name, last_name, email_address, organisation_name'
      tags:
        - V2 Admin
        - V2 Users
      parameters:
        - name: search
          type: string
          in: query
          description: search term to use on the collection
        - name: filter
          type: string
          in: query
          description: 'multiple filters can be applied. syntax is ?filter[verified]=true'
        - name: sort
          type: string
          in: query
          description: 'sorting can be applied, default is ascending or use - for descending. For Example ?sort=-last_name'
        - name: per_page
          type: integer
          in: query
          description: number of results (per page) to return
        - name: page
          type: integer
          in: query
          description: page number you want results from
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  title: AdminUserRead
                  type: object
                  properties:
                    uuid:
                      type: string
                    status:
                      type: string
                    readable_status:
                      type: string
                    type:
                      type: string
                    first_name:
                      type: string
                    last_name:
                      type: string
                    email_address:
                      type: string
                    job_role:
                      type: string
                    facebook:
                      type: string
                    instagram:
                      type: string
                    linkedin:
                      type: string
                    twitter:
                      type: string
                    whatsapp_phone:
                      type: string
                    date_added:
                      type: string
              links:
                type: object
                title: V2PaginationLinks
                properties:
                  first:
                    type: string
                  last:
                    type: string
                  prev:
                    type: string
                  next:
                    type: string
              meta:
                type: object
                title: V2PaginationMeta
                properties:
                  from:
                    type: integer
                  to:
                    type: integer
                  current_page:
                    type: integer
                  last_page:
                    type: integer
                  per_page:
                    type: integer
                  total:
                    type: integer
