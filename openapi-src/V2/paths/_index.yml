/v2/admin/{ENTITY}/{UUID}/reminder:
  post:
    $ref: './Entity/post-v2-admin-entity-uuid-reminder.yml'
/v2/leaderships:
  post:
    summary: Create a leaderships
    operationId: post-v2-leaderships
    responses:
      '201':
        description: Created
        schema:
          $ref: '../definitions/_index.yml#/V2LeadershipsRead'
    parameters:
      - in: body
        name: body
        schema:
          $ref: '../definitions/_index.yml#/V2LeadershipsCreate'
    tags:
      - V2 Leaderships
'/v2/leaderships/{UUID}':
  delete:
    summary: Delete a leaderships
    operationId: delete-v2-leaderships-UUID
    parameters:
      - type: string
        name: UUID
        in: path
        required: true
    responses:
      '200':
        description: OK
        schema:
          $ref: '../definitions/_index.yml#/V2LeadershipsRead'
    tags:
      - V2 Leaderships
  patch:
    summary: Update a leaderships
    operationId: patch-v2-leaderships-UUID
    responses:
      '200':
        description: OK
        schema:
          $ref: '../definitions/_index.yml#/V2LeadershipsRead'
    tags:
      - V2 Leaderships
    parameters:
      - type: string
        name: UUID
        in: path
        required: true
      - in: body
        name: body
        schema:
          $ref: '../definitions/_index.yml#/V2LeadershipsUpdate'
