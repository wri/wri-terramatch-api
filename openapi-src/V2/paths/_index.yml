'/v2/applications/{UUID}/export':
  get:
    summary: Export CSV document of an application
    operationId: get-v2-applications-UUID-export
    tags:
      - Export
      - V2 Application
    produces:
      - text/plain
    parameters:
      - type: string
        name: UUID
        in: path
        required: true
    responses:
      '200':
        description: OK
        schema:
          type: file
/auth/send-login-details:
  post:
    $ref: './Auth/post-auth-send-login-details.yml'
/auth/mail:
  get:
    $ref: './Auth/get-auth-mail.yml'
/auth/store:
  post:
    $ref: './Auth/post-auth-store.yml'
